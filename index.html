<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHEEL – Descargar Información</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      color: #1a73e8;
    }

    header p {
      margin-top: 0.5rem;
      color: #555;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #download-json {
      background: #1a73e8;
      color: #fff;
    }

    #download-json:hover { background: #1558b0; }

    #download-csv {
      background: #34a853;
      color: #fff;
    }

    #download-csv:hover { background: #287a3e; }

    #table-container {
      width: 100%;
      max-width: 700px;
      overflow-x: auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      background: #1a73e8;
      color: #fff;
    }

    tr:last-child td { border-bottom: none; }

    tr:nth-child(even) td { background: #f9fbff; }
  </style>
</head>
<body>
  <header>
    <h1>WHEEL</h1>
    <p>Consulta y descarga la información disponible</p>
  </header>

  <div class="actions">
    <button id="download-json">⬇ Descargar JSON</button>
    <button id="download-csv">⬇ Descargar CSV</button>
  </div>

  <div id="table-container">Cargando datos…</div>

  <script src="app.js"></script>
</body>
</html>
